apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-tls-config
data:
  default.conf: |
    server {
      listen 443 ssl;
      ssl_certificate     /etc/nginx/ssl/tls.crt;
      ssl_certificate_key /etc/nginx/ssl/tls.key;

      location / {
        proxy_pass http://llm:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-tls-proxy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llm-tls-proxy
  template:
    metadata:
      labels:
        app: llm-tls-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 443
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d
            - name: tls
              mountPath: /etc/nginx/ssl
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: nginx-tls-config
        - name: tls
          secret:
            secretName: llm-tls
---
apiVersion: v1
kind: Service
metadata:
  name: llm-tls
spec:
  selector:
    app: llm-tls-proxy
  type: ClusterIP
  ports:
    - port: 443
      targetPort: 443
