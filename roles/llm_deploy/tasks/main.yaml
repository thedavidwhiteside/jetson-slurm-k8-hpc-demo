---
- name: Create Hugging Face token secret
  ansible.builtin.shell:
    cmd: >
      kubectl create secret generic hf-token
      --from-literal=token={{ hf_token }}
      --dry-run=client -o yaml | kubectl apply -f -
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  when: hf_token | length > 0
  changed_when: true

- name: Apply LLM deployment
  ansible.builtin.command:
    cmd: kubectl apply -f {{ manifests_dest }}/llm-deploy.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig }}"
  register: llm_result
  changed_when: "'created' in llm_result.stdout or 'configured' in llm_result.stdout"
  when: manifests_changed | default(true)
