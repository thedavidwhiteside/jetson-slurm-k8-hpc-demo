---
# Stop k3s and disable it so it doesn't restart on reboot.
# The k3s binary and config are left in place (not removed).
- name: Stop and disable k3s service
  ansible.builtin.systemd:
    name: k3s
    state: stopped
    enabled: false
  failed_when: false

- name: Install munge and Slurm build dependencies
  ansible.builtin.apt:
    name:
      - munge
      - libmunge-dev
      - build-essential
      - libhwloc-dev
      - libpam0g-dev
      - libssl-dev
      - libnuma-dev
      - wget
    state: present
    update_cache: true

- name: Check installed slurmd version
  ansible.builtin.command: slurmd --version
  register: slurmd_installed_version
  failed_when: false
  changed_when: false

- name: Build and install Slurm {{ slurm_version }} from source
  when: slurm_version not in (slurmd_installed_version.stdout | default(''))
  block:
    - name: Download Slurm source tarball
      ansible.builtin.get_url:
        url: "https://download.schedmd.com/slurm/slurm-{{ slurm_version }}.tar.bz2"
        dest: "/tmp/slurm-{{ slurm_version }}.tar.bz2"
        mode: '0644'

    - name: Extract Slurm source
      ansible.builtin.unarchive:
        src: "/tmp/slurm-{{ slurm_version }}.tar.bz2"
        dest: /tmp/
        remote_src: true

    - name: Configure Slurm build
      ansible.builtin.command:
        cmd: ./configure --prefix=/usr --sysconfdir=/etc/slurm --with-munge
        chdir: "/tmp/slurm-{{ slurm_version }}"

    - name: Compile Slurm (takes several minutes on ARM)
      ansible.builtin.command:
        cmd: make -j{{ ansible_processor_vcpus | default(4) }}
        chdir: "/tmp/slurm-{{ slurm_version }}"

    - name: Install Slurm
      ansible.builtin.command:
        cmd: make install
        chdir: "/tmp/slurm-{{ slurm_version }}"

    - name: Install slurmd systemd service
      ansible.builtin.copy:
        src: "/tmp/slurm-{{ slurm_version }}/etc/slurmd.service"
        dest: /etc/systemd/system/slurmd.service
        remote_src: true
        mode: '0644'
      notify: Reload systemd

- name: Create slurmd spool directory
  ansible.builtin.file:
    path: /var/spool/slurmd
    state: directory
    owner: slurm
    group: slurm
    mode: '0755'

- name: Create slurm log directory
  ansible.builtin.file:
    path: /var/log/slurm
    state: directory
    owner: slurm
    group: slurm
    mode: '0755'

- name: Copy munge key from Ansible controller
  ansible.builtin.copy:
    src: /tmp/slurm-munge.key
    dest: /etc/munge/munge.key
    owner: munge
    group: munge
    mode: '0400'
  notify: Restart munge

- name: Enable cgroup v1 in extlinux boot config
  ansible.builtin.lineinfile:
    path: /boot/extlinux/extlinux.conf
    backrefs: true
    regexp: '^(\s+APPEND (?!.*systemd\.unified_cgroup_hierarchy).*)$'
    line: '\1 systemd.unified_cgroup_hierarchy=0'
  notify: Reboot required

- name: Configure cgroup.conf for cgroup v1
  ansible.builtin.template:
    src: cgroup.conf.j2
    dest: /etc/slurm/cgroup.conf
    owner: slurm
    group: slurm
    mode: '0644'
  notify: Restart slurmd

- name: Configure slurm.conf
  ansible.builtin.template:
    src: slurm.conf.j2
    dest: /etc/slurm/slurm.conf
    owner: slurm
    group: slurm
    mode: '0644'
  notify: Restart slurmd

- name: Configure gres.conf for integrated GPU
  ansible.builtin.template:
    src: gres.conf.j2
    dest: /etc/slurm/gres.conf
    owner: slurm
    group: slurm
    mode: '0644'
  when: slurm_enable_gpu
  notify: Restart slurmd

- name: Enable and start munge
  ansible.builtin.systemd:
    name: munge
    state: started
    enabled: true
    daemon_reload: true

- name: Enable and start slurmd
  ansible.builtin.systemd:
    name: slurmd
    state: started
    enabled: true

- name: Remove munge key from Ansible controller
  ansible.builtin.file:
    path: /tmp/slurm-munge.key
    state: absent
  delegate_to: localhost
  become: false
  run_once: true
