---
- name: Provision Jetson
  hosts: jetsons
  tasks:
    - name: Update apt package index
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
 
    - name: Upgrade all installed packages
      ansible.builtin.apt:
        upgrade: dist
      notify: Reboot Jetson
 
    - name: Install the full NVIDIA JetPack meta-package
      ansible.builtin.apt:
        name: nvidia-jetpack
        state: present
      notify: Reboot Jetson
  handlers:
    - name: Reboot Jetson
      ansible.builtin.reboot:
        msg: "Rebooting after JetPack / system update"
        reboot_timeout: 600
